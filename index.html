<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的 GitHub 网站</title>
  <style>
    body{
      margin:0;
      font-family: "Microsoft YaHei", sans-serif;
      display:grid;
      place-items:center;
      min-height:100vh;
      background:#f4f8ff;
      color:#1f2d3d;
    }
    .card{

      padding:32px;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
      text-align:center;
    }
    h1{margin:0 0 12px;}
    p{margin:0;color:#56657a;}
  </style>
</head>
<body>
  <div class="card">
    <h1>网站发布成功</h1>
    <p>这是我用 GitHub Pages 搭建的第一个网站。</p>
  </div>

</html>
